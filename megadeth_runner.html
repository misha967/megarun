<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEGADAVE RUNNER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Metal+Mania&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Share Tech Mono',monospace;overflow:hidden}
#bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(200,0,0,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(200,0,0,0.06) 1px,transparent 1px);background-size:40px 40px;z-index:0;pointer-events:none}
#splash{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:2rem;transition:opacity 0.8s ease}
#splash img{width:min(600px,85vw);animation:pulse 2s ease-in-out infinite}
#splash-sub{color:#555;font-size:13px;letter-spacing:0.25em;text-transform:uppercase;animation:blink 1.2s step-end infinite}
#splash-bar-wrap{width:min(300px,70vw);height:3px;background:#1a0000;border-radius:2px;overflow:hidden}
#splash-bar{height:100%;width:0%;background:#cc0000;transition:width 0.1s linear}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.85;transform:scale(0.98)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:720px;padding:1.5rem 1rem;opacity:0;transition:opacity 0.6s ease}
#wrap.visible{opacity:1}
#hud{width:100%;display:flex;justify-content:space-between;font-size:13px;color:#555;letter-spacing:0.12em;text-transform:uppercase}
#hud span{color:#cc0000;font-size:15px;font-weight:bold}
canvas{border:1px solid #2a0000;border-radius:4px;background:#0e0e0e;display:block;width:100%;max-width:720px;height:200px;cursor:pointer;box-shadow:0 0 40px rgba(180,0,0,0.12)}
#msg{font-size:12px;color:#444;letter-spacing:0.1em;text-align:center;text-transform:uppercase}
#music-bar{display:flex;align-items:center;gap:10px;font-size:12px;color:#555;letter-spacing:0.08em}
#music-bar button{background:none;border:1px solid #2a0000;color:#cc0000;padding:3px 10px;font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;border-radius:2px;letter-spacing:0.1em}
#music-bar button:hover{background:#1a0000}
#vol-slider{width:80px;accent-color:#cc0000}
</style>
</head>
<body>
<div id="splash">
  <img id="logo-img" alt="MEGADAVE">
  <div id="splash-bar-wrap"><div id="splash-bar"></div></div>
  <div id="splash-sub">Press any key to shred</div>
</div>
<div id="bg-grid"></div>
<div id="wrap">
  <div id="hud">
    <div>Score &nbsp;<span id="score">0</span></div>
    <div>Best &nbsp;<span id="best">0</span></div>
  </div>
  <canvas id="c" width="720" height="200"></canvas>
  <p id="msg">Espace &middot; Clic &middot; &uarr; pour d&eacute;marrer</p>
  <div id="music-bar">
    <span>&#127928; Holy Wars</span>
    <button id="mute-btn">MUTE</button>
    <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="0.5">
  </div>
</div>
<audio id="bgm" loop preload="auto">
  <source src="holywars.mp3" type="audio/mpeg">
</audio>

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');

var bestEl = document.getElementById('best');
var msgEl = document.getElementById('msg');

var W=720, H=200, GROUND=148, DINO_X=80;
var state='idle', score=0, best=0, frame=0, speed=5;
var obstacles=[], clouds=[], particles=[], skulls=[], projectiles=[];
var dino={y:GROUND, vy:0, onGround:true,
  jump:function(){if(this.onGround){this.vy=-15;this.onGround=false;}}
};

// ── SKULLS (bigger, more visible) ──
function initSkulls(){
  skulls=[];
  for(var i=0;i<18;i++){
    skulls.push({
      x:Math.random()*W,
      y:12+Math.random()*(GROUND-40),
      size:16+Math.random()*22,
      alpha:0.18+Math.random()*0.25,
      spd:0.15+Math.random()*0.35,
      rot:Math.random()*Math.PI*2,
      rotSpd:(Math.random()-0.5)*0.025,
      pulse:Math.random()*Math.PI*2
    });
  }
}
initSkulls();

function drawSkulls(){
  for(var i=0;i<skulls.length;i++){
    var s=skulls[i];
    s.x -= s.spd*(speed/5);
    s.rot += s.rotSpd;
    s.pulse += 0.04;
    if(s.x+s.size<0){s.x=W+s.size; s.y=12+Math.random()*(GROUND-40);}
    var pulseAlpha = s.alpha + Math.sin(s.pulse)*0.06;
    ctx.save();
    ctx.globalAlpha = Math.max(0.1, pulseAlpha);
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rot);
    // Red glow behind skull
    ctx.shadowColor='#ff0000';
    ctx.shadowBlur=12;
    ctx.font='bold '+s.size+'px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillStyle='#ff3300';
    ctx.fillText('\uD83D\uDC80',0,0);
    ctx.restore();
  }
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

// ── PROJECTILES ──
function spawnProjectile(){
  var type = Math.random() < 0.5 ? 'knife' : 'fireball';
  // Fly at a random height in the upper 2/3 of the play area
  var minY = 30, maxY = GROUND - 10;
  projectiles.push({
    x: W + 30,
    y: minY + Math.random()*(maxY - minY),
    type: type,
    spd: (speed * 1.4) + Math.random()*2,
    rot: 0,
    wobble: Math.random()*Math.PI*2,
    wobbleAmp: type==='fireball' ? 2+Math.random()*3 : 0,
    trail: []
  });
}

function drawKnife(x, y, rot){
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  // Blade
  ctx.fillStyle='#cccccc';
  ctx.beginPath();
  ctx.moveTo(20, 0);
  ctx.lineTo(-12, -4);
  ctx.lineTo(-12, 4);
  ctx.closePath();
  ctx.fill();
  // Edge highlight
  ctx.strokeStyle='#ffffff';
  ctx.lineWidth=0.8;
  ctx.beginPath();
  ctx.moveTo(20,0); ctx.lineTo(-12,-4);
  ctx.stroke();
  // Handle
  ctx.fillStyle='#5a2d00';
  ctx.fillRect(-22,-4,10,8);
  // Handle wrap
  ctx.strokeStyle='#8b4513'; ctx.lineWidth=1.5;
  for(var i=0;i<3;i++){
    ctx.beginPath();
    ctx.moveTo(-22+i*3,-4); ctx.lineTo(-22+i*3,4);
    ctx.stroke();
  }
  ctx.restore();
}

function drawFireball(x, y, frame, trail){
  // Trail
  for(var i=0;i<trail.length;i++){
    var t=trail[i];
    ctx.save();
    ctx.globalAlpha = t.life * 0.4;
    ctx.fillStyle = t.life > 0.5 ? '#ff6600' : '#ff2200';
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  // Core
  ctx.save();
  ctx.shadowColor='#ff4400'; ctx.shadowBlur=18;
  // Outer glow
  var grd = ctx.createRadialGradient(x,y,1,x,y,14);
  grd.addColorStop(0,'rgba(255,220,50,0.95)');
  grd.addColorStop(0.4,'rgba(255,80,0,0.85)');
  grd.addColorStop(1,'rgba(200,0,0,0)');
  ctx.fillStyle=grd;
  ctx.beginPath();
  ctx.arc(x,y,14,0,Math.PI*2);
  ctx.fill();
  // Inner core
  ctx.fillStyle='#fff8c0';
  ctx.beginPath();
  ctx.arc(x,y,5,0,Math.PI*2);
  ctx.fill();
  // Flicker spikes
  var spikes=6;
  ctx.strokeStyle='rgba(255,160,0,0.7)'; ctx.lineWidth=1.5;
  for(var s=0;s<spikes;s++){
    var angle=(s/spikes)*Math.PI*2 + frame*0.15;
    var len=10+Math.random()*6;
    ctx.beginPath();
    ctx.moveTo(x+Math.cos(angle)*5, y+Math.sin(angle)*5);
    ctx.lineTo(x+Math.cos(angle)*len, y+Math.sin(angle)*len);
    ctx.stroke();
  }
  ctx.restore();
}

function updateProjectiles(){
  var interval = Math.max(80, 220 - score/8);
  if(frame % Math.floor(interval) === 0) spawnProjectile();

  for(var i=0;i<projectiles.length;i++){
    var p=projectiles[i];
    p.wobble+=0.08;
    p.x -= p.spd;
    if(p.type==='fireball'){
      p.y += Math.sin(p.wobble)*p.wobbleAmp*0.3;
      // Trail
      p.trail.push({x:p.x+12, y:p.y, r:6+Math.random()*3, life:1});
      if(p.trail.length>10) p.trail.shift();
      for(var j=0;j<p.trail.length;j++) p.trail[j].life-=0.12;
    } else {
      p.rot -= 0.18; // spinning knife
    }
  }
  projectiles = projectiles.filter(function(p){ return p.x > -40; });
}

function drawProjectiles(){
  for(var i=0;i<projectiles.length;i++){
    var p=projectiles[i];
    if(p.type==='knife'){
      drawKnife(p.x, p.y, p.rot);
    } else {
      drawFireball(p.x, p.y, frame, p.trail);
    }
  }
}

function checkProjectileCollision(){
  for(var i=0;i<projectiles.length;i++){
    var p=projectiles[i];
    var hitR = p.type==='fireball' ? 12 : 14;
    var dx = p.x - DINO_X;
    var dy = p.y - (dino.y - 35);
    if(Math.sqrt(dx*dx+dy*dy) < hitR+12) return true;
  }
  return false;
}

function spawnObstacle(){
  var h=24+Math.random()*26, w=14+Math.random()*8;
  var n=Math.random()<0.35?2:1;
  obstacles.push({x:W+10, w:w*n+(n-1)*5, h:h, type:n});
}
function spawnCloud(){
  clouds.push({x:W+10, y:18+Math.random()*35, w:50+Math.random()*40});
}
function spawnParticles(x,y,type){
  var color = type==='fire' ? '#ff6600' : '#cc0000';
  var color2 = type==='fire' ? '#ffcc00' : '#ff0000';
  for(var i=0;i<18;i++){
    var a=Math.random()*Math.PI*2, spd=2+Math.random()*5;
    particles.push({x:x,y:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-3,
      life:1,r:2+Math.random()*5,
      color:Math.random()<0.5?color:color2});
  }
}
function drawGround(){
  ctx.strokeStyle='#2a0000'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,GROUND+30); ctx.lineTo(W,GROUND+30); ctx.stroke();
  ctx.fillStyle='#1a0000';
  for(var i=0;i<14;i++){
    var dx=((frame*speed*0.4+i*55)%W);
    ctx.fillRect(dx,GROUND+31,20+(i%3)*8,1);
  }
}
function drawCloud(c){
  ctx.save(); ctx.globalAlpha=0.07; ctx.fillStyle='#ff0000';
  ctx.beginPath(); ctx.ellipse(c.x,c.y,c.w/2,9,0,0,Math.PI*2); ctx.fill(); ctx.restore();
}
function drawDino(y,dead){
  var iW=62,iH=78,ix=DINO_X-iW/2,iy=y-iH+8;
  if(charImg.complete && charImg.naturalWidth>0){
    ctx.save();
    if(dead){ctx.globalAlpha=0.45;ctx.filter='grayscale(1) brightness(0.3) saturate(0)';}
    ctx.drawImage(charImg,ix,iy,iW,iH);
    ctx.restore();
  } else {
    ctx.fillStyle=dead?'#550000':'#cc0000';
    ctx.fillRect(DINO_X-12,y-30,24,30);
  }
}
function drawCactus(ob){
  var n=ob.type, uw=Math.floor(ob.w/n)-(n>1?3:0);
  ctx.fillStyle='#7a0000'; ctx.strokeStyle='#cc0000'; ctx.lineWidth=0.5;
  for(var i=0;i<n;i++){
    var cx2=ob.x+i*(uw+5);
    ctx.fillRect(cx2,GROUND+30-ob.h,uw,ob.h);
    ctx.strokeRect(cx2,GROUND+30-ob.h,uw,ob.h);
    var armH=ob.h*0.55;
    ctx.fillRect(cx2-8,GROUND+30-armH-7,8,5);
    ctx.fillRect(cx2-8,GROUND+30-armH-18,5,15);
    ctx.fillRect(cx2+uw,GROUND+30-armH-7,8,5);
    ctx.fillRect(cx2+uw,GROUND+30-armH-18,5,15);
  }
}
function drawParticles(){
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    ctx.save();ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color || '#cc0000';
    ctx.shadowColor=p.color; ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}
function checkCollision(){
  for(var i=0;i<obstacles.length;i++){
    var ob=obstacles[i], m=10;
    if(DINO_X+18-m>ob.x+m && DINO_X-18+m<ob.x+ob.w-m &&
       dino.y-5>GROUND+30-ob.h && dino.y-65<GROUND+30) return true;
  }
  return false;
}
function drawOverlay(t1,t2){
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.font='bold 20px "Metal Mania",cursive';
  ctx.fillStyle='#cc0000';ctx.textAlign='center';
  ctx.shadowColor='#ff0000';ctx.shadowBlur=14;
  ctx.fillText(t1,W/2,H/2-12);ctx.shadowBlur=0;
  ctx.font='13px "Share Tech Mono",monospace';
  ctx.fillStyle='#666';
  ctx.fillText(t2,W/2,H/2+14);
  ctx.restore();ctx.textAlign='left';
}
function update(){
  dino.vy+=0.72;dino.y+=dino.vy;
  if(dino.y>=GROUND){dino.y=GROUND;dino.vy=0;dino.onGround=true;}
  speed=5+score/180;
  obstacles.forEach(function(o){o.x-=speed;});
  obstacles=obstacles.filter(function(o){return o.x+o.w>-20;});
  clouds.forEach(function(c){c.x-=speed*0.25;});
  clouds=clouds.filter(function(c){return c.x>-80;});
  particles.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=0.04;});
  particles=particles.filter(function(p){return p.life>0;});
  updateProjectiles();
  if(frame%Math.max(55,110-Math.floor(score/12))===0) spawnObstacle();
  if(frame%85===0) spawnCloud();
  score++;frame++;
}
function draw(dead){
  ctx.clearRect(0,0,W,H);
  drawSkulls();
  for(var i=0;i<clouds.length;i++) drawCloud(clouds[i]);
  drawGround();
  drawProjectiles();
  for(var i=0;i<obstacles.length;i++) drawCactus(obstacles[i]);
  drawParticles();
  drawDino(dino.y,dead);
}
var animId;
var deathType='hit';
function gameLoop(){
  if(state!=='running') return;
  update();draw(false);scoreEl.textContent=score;
  var hitObstacle = checkCollision();
  var hitProjectile = checkProjectileCollision();
  if(hitObstacle || hitProjectile){
    state='dead';
    playBoom();
    if(score>best){best=score;bestEl.textContent=best;}
    deathType = hitProjectile ? (projectiles.find(function(p){return true;}) && projectiles[0].type==='fireball' ? 'fire' : 'knife') : 'hit';
    spawnParticles(DINO_X, dino.y-35, hitProjectile && projectiles.length && projectiles[0].type==='fireball' ? 'fire' : 'blood');
    draw(true); drawParticles();
    var msg = hitProjectile ? (hitObstacle ? 'GAME OVER' : (deathType==='fire'?'GRILLE PAR LE FEU':'POIGNARDE DANS LE DOS')) : 'PEACE SELLS';
    drawOverlay(msg+' \u2014 '+score+' PTS','ESPACE \u00b7 CLIC \u00b7 \u2191 POUR REJOUER');
    msgEl.textContent='Rejouer'; stopMusic(); return;
  }
  animId=requestAnimationFrame(gameLoop);
}
function startGame(){
  if(state==='running') return;
  cancelAnimationFrame(animId);
  dino.y=GROUND;dino.vy=0;dino.onGround=true;
  obstacles.length=0;clouds.length=0;particles.length=0;projectiles.length=0;
  initSkulls();
  score=0;frame=0;speed=5;state='running';
  msgEl.textContent='Sauter'; tryPlayMusic(); gameLoop();
}
function handleJump(){
  if(!splashDone){dismissSplash();return;}
  if(state==='idle'||state==='dead'){startGame();return;}
  dino.jump();
}
document.addEventListener('keydown',function(e){
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();handleJump();}
});
canvas.addEventListener('click',handleJump);
canvas.addEventListener('touchstart',function(e){e.preventDefault();handleJump();},{passive:false});
draw(false);
drawOverlay('MEGADAVE RUNNER','ESPACE \u00b7 CLIC \u00b7 \u2191 POUR D\u00c9MARRER');
</script>
</body>
</html>
