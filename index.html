<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SYMETRY — ROULETTE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #080808;
      --surface:  #111111;
      --surface2: #1a1a1a;
      --border:   #2a2a2a;
      --silver:   #c8c8c8;
      --white:    #ffffff;
      --dim:      #666666;
      --red:      #c0392b;
      --red-lit:  #e74c3c;
      --green:    #1a6b3a;
      --green-lit:#27ae60;
      --font-display: 'Cormorant Garamond', serif;
      --font-mono:    'Space Mono', monospace;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { width:100%; height:100%; background:var(--bg); color:var(--white); font-family:var(--font-mono); overflow:hidden; }

    /* ══ LOADING ══ */
    #loading-screen {
      position: fixed; inset:0; background:#000;
      display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; gap:28px;
    }
    .loading-logo-wrap {
      display:flex; flex-direction:column; align-items:center; gap:14px;
      opacity:0; transform:translateY(20px);
      animation: logoReveal 1s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes logoReveal { to { opacity:1; transform:translateY(0); } }
    .loading-title { font-family:var(--font-display); font-size:2rem; font-weight:300; letter-spacing:0.5em; color:#fff; text-transform:uppercase; }
    .loading-sub { font-size:0.55rem; letter-spacing:0.35em; color:var(--dim); text-transform:uppercase; }
    .loading-bar-wrap { width:200px; display:flex; flex-direction:column; gap:8px; align-items:center; opacity:0; animation:fadeIn 0.5s 0.8s forwards; }
    @keyframes fadeIn { to { opacity:1; } }
    .loading-bar { width:100%; height:1px; background:#222; position:relative; overflow:hidden; }
    .loading-bar-fill { position:absolute; left:0; top:0; height:100%; background:var(--silver); width:0%; transition:width 0.3s ease; box-shadow:0 0 8px var(--silver); }
    .loading-pct { font-size:0.6rem; letter-spacing:0.2em; color:var(--dim); }
    .loading-step { font-size:0.55rem; letter-spacing:0.15em; color:#333; text-transform:uppercase; min-height:14px; }
    #loading-screen.done { animation:loadFadeOut 0.6s 0.3s ease forwards; }
    @keyframes loadFadeOut { to { opacity:0; pointer-events:none; } }

    /* ══ GAME ══ */
    #game-screen { display:none; flex-direction:column; height:100dvh; overflow:hidden; }

    /* TOP BAR */
    .top-bar {
      display:flex; align-items:center; justify-content:space-between;
      padding:8px 14px; border-bottom:1px solid var(--border); flex-shrink:0;
    }
    .top-logo { display:flex; align-items:center; gap:10px; }
    .top-logo-text { font-family:var(--font-display); font-size:1.1rem; font-weight:300; letter-spacing:0.4em; color:#fff; text-transform:uppercase; }
    .top-right { display:flex; align-items:center; gap:14px; }
    .balance-label { font-size:0.5rem; letter-spacing:0.2em; color:var(--dim); text-transform:uppercase; }
    .balance-value { font-size:0.95rem; font-weight:700; color:#fff; }
    #sound-btn { background:none; border:1px solid var(--border); color:var(--dim); border-radius:6px; padding:5px 8px; cursor:pointer; transition:all 0.15s; }

    /* ══ MAIN LAYOUT ══ */
    .main-area { display:flex; flex:1; overflow:hidden; flex-direction:column; }

    /* WHEEL SECTION */
    .wheel-section {
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px 0 6px;
      background:var(--bg);
      position:relative;
    }
    #wheel-canvas { display:block; }

    /* WIN DISPLAY */
    .win-strip {
      display:flex; align-items:center; justify-content:center; gap:12px;
      padding:5px 14px; background:var(--surface); border-bottom:1px solid var(--border);
      flex-shrink:0; min-height:32px;
    }
    #win-number-badge {
      width:28px; height:28px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-mono); font-size:0.75rem; font-weight:700;
      flex-shrink:0; opacity:0; transition:all 0.3s;
    }
    #win-number-badge.visible { opacity:1; }
    #win-message { font-size:0.75rem; color:var(--dim); min-width:120px; }
    #win-message.won { color:#fff; }
    #win-message.lost { color:#444; }
    #last-net { font-family:var(--font-mono); font-size:0.8rem; font-weight:700; }
    #last-net.pos { color:#fff; }
    #last-net.neg { color:#444; }

    /* TABLE SECTION */
    .table-section {
      flex:1; overflow-y:auto; overflow-x:hidden;
      padding:10px 8px; background:var(--bg);
      display:flex; flex-direction:column; gap:5px;
      scrollbar-width:none;
      align-items:stretch;
    }
    .table-section::-webkit-scrollbar { display:none; }

    /* Roulette grid */
    .roulette-grid { display:flex; flex-direction:column; gap:3px; width:100%; }

    /* Zero row */
    .zero-row { display:flex; gap:3px; }
    .zero-cell {
      flex:1; height:40px; border-radius:6px;
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-mono); font-size:0.9rem; font-weight:700;
      cursor:pointer; background:var(--green); color:#fff;
      transition:all 0.15s; position:relative; user-select:none;
    }
    .zero-cell:active { transform:scale(0.96); }
    .zero-cell.selected { outline:2px solid #fff; outline-offset:1px; }

    /* Number grid: 3 rows x 12 cols */
    .number-grid { display:grid; grid-template-columns:repeat(12,1fr); gap:3px; width:100%; }
    .num-cell {
      height:40px; border-radius:5px;
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-mono); font-size:0.72rem; font-weight:700;
      cursor:pointer; transition:all 0.12s; position:relative; user-select:none;
    }
    .num-cell.red-num   { background:var(--red); color:#fff; }
    .num-cell.black-num { background:#1e1e1e; color:var(--silver); border:1px solid #333; }
    .num-cell:active { transform:scale(0.93); }
    .num-cell.selected { outline:2px solid #fff; outline-offset:1px; }
    .num-cell.winning  { animation:winPulse 0.8s ease 3; }
    @keyframes winPulse {
      0%,100% { transform:scale(1); }
      50%      { transform:scale(1.12); box-shadow:0 0 12px rgba(255,255,255,0.6); }
    }

    /* Outside bets row */
    .outside-row { display:flex; gap:3px; }
    .outside-cell {
      flex:1; height:34px; border-radius:6px;
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-mono); font-size:0.64rem; font-weight:700;
      cursor:pointer; background:var(--surface2); color:var(--silver);
      border:1px solid var(--border); transition:all 0.12s; user-select:none;
      letter-spacing:0.02em; white-space:nowrap; padding:0 2px;
    }
    .outside-cell:active { transform:scale(0.96); }
    .outside-cell.selected { background:var(--border); color:#fff; border-color:#666; }
    .outside-cell.red-cell   { background:#2a0a0a; color:#e74c3c; border-color:#5a1a1a; }
    .outside-cell.red-cell.selected  { background:var(--red); color:#fff; border-color:#e74c3c; }
    .outside-cell.black-cell { background:#111; color:var(--silver); border-color:#333; }
    .outside-cell.black-cell.selected { background:#333; color:#fff; border-color:#666; }

    /* Column bets */
    .grid-with-columns { display:flex; gap:3px; }
    .column-bets { display:flex; flex-direction:column; gap:3px; width:38px; flex-shrink:0; }
    .col-cell {
      flex:1; border-radius:6px; text-align:center; line-height:1.2;
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-mono); font-size:0.58rem; font-weight:700;
      cursor:pointer; background:var(--surface2); color:var(--silver);
      border:1px solid var(--border); transition:all 0.12s; user-select:none;
    }
    .col-cell:active { transform:scale(0.96); }
    .col-cell.selected { background:var(--border); color:#fff; border-color:#666; }

    /* Chip indicator on cell */
    .chip-dot {
      position:absolute; top:2px; right:2px;
      width:8px; height:8px; border-radius:50%;
      background:#fff; pointer-events:none;
      font-size:0; z-index:2;
    }

    /* CONTROLS */
    .controls {
      flex-shrink:0; padding:10px 12px; border-top:1px solid var(--border);
      display:flex; flex-direction:column; gap:8px; background:var(--surface);
    }
    .bet-controls { display:flex; gap:8px; align-items:stretch; }
    .chip-selector { display:flex; gap:4px; flex-wrap:wrap; }
    .chip-btn {
      padding:6px 10px; border-radius:20px;
      border:1px solid var(--border); background:var(--surface2);
      color:var(--dim); font-family:var(--font-mono); font-size:0.68rem;
      cursor:pointer; transition:all 0.12s; white-space:nowrap;
    }
    .chip-btn.active { background:#fff; color:#000; border-color:#fff; }
    .chip-btn:active { transform:scale(0.95); }

    .action-row { display:flex; gap:6px; }
    #spin-btn {
      flex:1; padding:13px; border-radius:10px; border:none;
      background:#fff; color:#000;
      font-family:var(--font-display); font-size:1.1rem; font-weight:600;
      letter-spacing:0.15em; cursor:pointer; transition:all 0.15s; text-transform:uppercase;
    }
    #spin-btn:disabled { background:var(--border); color:var(--dim); cursor:not-allowed; }
    #spin-btn:active:not(:disabled) { transform:scale(0.97); }
    #clear-btn, #rebet-btn {
      padding:13px 14px; border-radius:10px; border:1px solid var(--border);
      background:var(--surface2); color:var(--dim);
      font-family:var(--font-mono); font-size:0.7rem; cursor:pointer; transition:all 0.15s;
    }
    #clear-btn:active, #rebet-btn:active { transform:scale(0.97); }

    .bets-summary { font-size:0.65rem; color:var(--dim); text-align:right; min-height:14px; }
    .bets-summary span { color:var(--silver); }

    /* ══ MOBILE TWEAKS ══ */
    @media (max-width:430px) {
      .controls { padding:8px 10px; gap:6px; }
      .chip-btn { padding:5px 8px; font-size:0.62rem; }
      #spin-btn { font-size:1rem; padding:12px; }
      .num-cell { height:36px; font-size:0.68rem; }
      .zero-cell { height:36px; }
      .outside-cell { height:32px; font-size:0.6rem; }
      .col-cell { font-size:0.55rem; }
    }
    ::-webkit-scrollbar { display:none; }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loading-logo-wrap">
    <img src="logo.JPG" alt="Symetry" style="width:160px;height:160px;object-fit:contain;filter:brightness(1.1);">
    <div class="loading-sub">Casino Games Studio</div>
  </div>
  <div class="loading-bar-wrap">
    <div class="loading-bar"><div class="loading-bar-fill" id="loading-fill"></div></div>
    <div class="loading-pct" id="loading-pct">0%</div>
    <div class="loading-step" id="loading-step">Initialisation</div>
  </div>
</div>

<!-- GAME -->
<div id="game-screen">

  <div class="top-bar">
    <div class="top-logo">
      <img src="logo.JPG" alt="Symetry" style="width:28px;height:28px;object-fit:contain;">
      <span class="top-logo-text">Roulette</span>
    </div>
    <div class="top-right">
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px;">
        <span class="balance-label">Balance</span>
        <span class="balance-value" id="balance-val">1 000 $</span>
      </div>
      <button id="sound-btn" onclick="toggleSound()">
        <svg id="snd-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
        <svg id="snd-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- WHEEL -->
  <div class="wheel-section" id="wheel-section">
    <canvas id="wheel-canvas"></canvas>
  </div>

  <!-- WIN STRIP -->
  <div class="win-strip">
    <div id="win-number-badge"></div>
    <div id="win-message">Placez vos mises</div>
    <div id="last-net"></div>
  </div>

  <!-- TABLE -->
  <div class="table-section">

    <!-- Zero -->
    <div class="zero-row">
      <div class="zero-cell num-cell" data-number="0" onclick="toggleStraight(0)">0</div>
    </div>

    <!-- Numbers grid + column bets -->
    <div class="grid-with-columns">
      <div class="number-grid" id="number-grid"></div>
      <div class="column-bets">
        <div class="col-cell" data-col="3" onclick="toggleColumn(3)">Col<br>3</div>
        <div class="col-cell" data-col="2" onclick="toggleColumn(2)">Col<br>2</div>
        <div class="col-cell" data-col="1" onclick="toggleColumn(1)">Col<br>1</div>
      </div>
    </div>

    <!-- Dozens -->
    <div class="outside-row">
      <div class="outside-cell" data-dozen="1" onclick="toggleDozen(1)">1-12</div>
      <div class="outside-cell" data-dozen="2" onclick="toggleDozen(2)">13-24</div>
      <div class="outside-cell" data-dozen="3" onclick="toggleDozen(3)">25-36</div>
    </div>

    <!-- Even chances -->
    <div class="outside-row">
      <div class="outside-cell" data-bet="low"   onclick="toggleOutside('low')">1-18</div>
      <div class="outside-cell" data-bet="even"  onclick="toggleOutside('even')">Pair</div>
      <div class="outside-cell red-cell"   data-bet="red"   onclick="toggleOutside('red')">Rouge</div>
      <div class="outside-cell black-cell" data-bet="black" onclick="toggleOutside('black')">Noir</div>
      <div class="outside-cell" data-bet="odd"   onclick="toggleOutside('odd')">Impair</div>
      <div class="outside-cell" data-bet="high"  onclick="toggleOutside('high')">19-36</div>
    </div>

  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="chip-selector" id="chip-selector">
      <button class="chip-btn active" data-value="5"    onclick="selectChip(5)">5$</button>
      <button class="chip-btn"        data-value="10"   onclick="selectChip(10)">10$</button>
      <button class="chip-btn"        data-value="25"   onclick="selectChip(25)">25$</button>
      <button class="chip-btn"        data-value="50"   onclick="selectChip(50)">50$</button>
      <button class="chip-btn"        data-value="100"  onclick="selectChip(100)">100$</button>
    </div>
    <div class="action-row">
      <button id="clear-btn" onclick="clearBets()">✕ Effacer</button>
      <button id="spin-btn"  onclick="doSpin()">SPIN</button>
      <button id="rebet-btn" onclick="rebet()">↺ Remiser</button>
    </div>
    <div class="bets-summary" id="bets-summary"></div>
  </div>

</div>

<script src="roulette-math.js"></script>
<script>
const RM = window.RouletteMath;

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let balance    = parseFloat(localStorage.getItem('symetry_roulette_balance') || '1000');
let chipValue  = 5;
let bets       = [];   // [{ type, numbers, amount, id }]
let lastBets   = [];
let spinning   = false;
let soundEnabled = true;
let betIdCounter = 0;

function saveBalance() { localStorage.setItem('symetry_roulette_balance', balance.toFixed(2)); }
function updateBalanceUI() {
  document.getElementById('balance-val').textContent =
    balance.toLocaleString('fr-FR', { maximumFractionDigits: 2 }) + ' $';
}

// ═══════════════════════════════════════════════════════
// LOADING
// ═══════════════════════════════════════════════════════
const loadingSteps = [
  [20, 'Chargement des assets'],
  [45, 'Construction de la roue'],
  [70, 'Vérification du RTP'],
  [90, 'Mise en place de la table'],
  [100, 'Prêt'],
];
let loadIdx = 0;

function advanceLoading() {
  if (loadIdx >= loadingSteps.length) return;
  const [pct, step] = loadingSteps[loadIdx++];
  document.getElementById('loading-fill').style.width = pct + '%';
  document.getElementById('loading-pct').textContent = pct + '%';
  document.getElementById('loading-step').textContent = step;
  if (loadIdx < loadingSteps.length) setTimeout(advanceLoading, 300 + Math.random() * 200);
  else setTimeout(startGame, 500);
}
setTimeout(advanceLoading, 900);

function startGame() {
  document.getElementById('loading-screen').classList.add('done');
  setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 900);
  document.getElementById('game-screen').style.display = 'flex';
  setTimeout(() => {
    buildNumberGrid();
    initWheel();
  }, 100);
  updateBalanceUI();
}

// ═══════════════════════════════════════════════════════
// WHEEL CANVAS
// ═══════════════════════════════════════════════════════
const wCanvas = document.getElementById('wheel-canvas');
const wCtx    = wCanvas.getContext('2d');
let wheelAngle  = 0;      // current rotation of wheel
let ballAngle   = 0;      // current angle of ball
let ballRadius  = 0;      // current radial position of ball
let animating   = false;
let wheelR      = 0;      // outer radius
let dpr         = 1;

function initWheel() {
  dpr = window.devicePixelRatio || 1;
  const section = document.getElementById('wheel-section');
  const size = Math.min(section.offsetWidth, 200);
  wCanvas.style.width  = size + 'px';
  wCanvas.style.height = size + 'px';
  wCanvas.width  = size * dpr;
  wCanvas.height = size * dpr;
  wCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  wheelR = size / 2 - 4;
  drawWheel(0, null);
}

const COLORS = { green:'#1a6b3a', red:'#8b1a1a', black:'#1a1a1a' };

function numberColor(n) {
  if (n === 0) return COLORS.green;
  return RM.isRed(n) ? COLORS.red : COLORS.black;
}

function drawWheel(angle, winNumber) {
  const size  = wCanvas.offsetWidth;
  const cx    = size / 2;
  const cy    = size / 2;
  const r     = wheelR;
  const slice = (Math.PI * 2) / 37;

  wCtx.clearRect(0, 0, size, size);

  // Wood outer ring
  wCtx.beginPath();
  wCtx.arc(cx, cy, r + 8, 0, Math.PI * 2);
  const woodGrad = wCtx.createRadialGradient(cx, cy, r * 0.9, cx, cy, r + 8);
  woodGrad.addColorStop(0, '#3a1f08');
  woodGrad.addColorStop(1, '#1a0800');
  wCtx.fillStyle = woodGrad;
  wCtx.fill();

  // Metal ring border
  wCtx.beginPath();
  wCtx.arc(cx, cy, r + 1, 0, Math.PI * 2);
  wCtx.strokeStyle = '#666';
  wCtx.lineWidth = 2;
  wCtx.stroke();

  // Slices — clockwise
  RM.WHEEL_ORDER.forEach((num, i) => {
    const startA = angle - Math.PI / 2 + i * slice;
    const endA   = startA + slice;
    const isWin  = num === winNumber;

    wCtx.beginPath();
    wCtx.moveTo(cx, cy);
    wCtx.arc(cx, cy, r, startA, endA);
    wCtx.closePath();
    wCtx.fillStyle = isWin ? '#f0f0f0' : numberColor(num);
    wCtx.fill();
    wCtx.strokeStyle = '#111';
    wCtx.lineWidth = 0.8;
    wCtx.stroke();

    // Number at 83% radius
    const midA = startA + slice / 2;
    const tx = cx + r * 0.83 * Math.cos(midA);
    const ty = cy + r * 0.83 * Math.sin(midA);
    wCtx.save();
    wCtx.translate(tx, ty);
    wCtx.rotate(midA + Math.PI / 2);
    wCtx.font = `bold ${Math.max(6, r * 0.082)}px 'Space Mono', monospace`;
    wCtx.textAlign = 'center';
    wCtx.textBaseline = 'middle';
    wCtx.fillStyle = isWin ? '#000' : '#fff';
    wCtx.fillText(String(num), 0, 0);
    wCtx.restore();
  });

  // Inner bowl
  wCtx.beginPath();
  wCtx.arc(cx, cy, r * 0.54, 0, Math.PI * 2);
  const bowlGrad = wCtx.createRadialGradient(cx, cy, 0, cx, cy, r * 0.54);
  bowlGrad.addColorStop(0, '#3a2010');
  bowlGrad.addColorStop(1, '#1a0800');
  wCtx.fillStyle = bowlGrad;
  wCtx.fill();
  wCtx.strokeStyle = '#555';
  wCtx.lineWidth = 1;
  wCtx.stroke();

  // Spokes
  for (let s = 0; s < 8; s++) {
    const sa = angle + s * (Math.PI / 4);
    wCtx.beginPath();
    wCtx.moveTo(cx + r * 0.55 * Math.cos(sa), cy + r * 0.55 * Math.sin(sa));
    wCtx.lineTo(cx + r * 0.22 * Math.cos(sa), cy + r * 0.22 * Math.sin(sa));
    wCtx.strokeStyle = '#4a2a10';
    wCtx.lineWidth = 2;
    wCtx.stroke();
  }

  // Center hub
  const hubGrad = wCtx.createRadialGradient(cx - r*0.03, cy - r*0.03, 0, cx, cy, r * 0.18);
  hubGrad.addColorStop(0, '#aaa');
  hubGrad.addColorStop(0.5, '#555');
  hubGrad.addColorStop(1, '#222');
  wCtx.beginPath();
  wCtx.arc(cx, cy, r * 0.18, 0, Math.PI * 2);
  wCtx.fillStyle = hubGrad;
  wCtx.fill();
  wCtx.strokeStyle = '#777';
  wCtx.lineWidth = 1;
  wCtx.stroke();

  // Gold center button
  const goldGrad = wCtx.createRadialGradient(cx - r*0.02, cy - r*0.03, 0, cx, cy, r * 0.07);
  goldGrad.addColorStop(0, '#ffe066');
  goldGrad.addColorStop(1, '#b8860b');
  wCtx.beginPath();
  wCtx.arc(cx, cy, r * 0.07, 0, Math.PI * 2);
  wCtx.fillStyle = goldGrad;
  wCtx.fill();

  // Fixed indicator triangle at top (12 o'clock) — does NOT rotate with wheel
  wCtx.save();
  wCtx.translate(cx, cy - r + 2);
  wCtx.beginPath();
  wCtx.moveTo(0, -8);
  wCtx.lineTo(-5, 0);
  wCtx.lineTo(5, 0);
  wCtx.closePath();
  wCtx.fillStyle = '#ffffff';
  wCtx.fill();
  wCtx.restore();
}

function drawBall(bAngle, bRadius) {
  const size = wCanvas.offsetWidth;
  const cx   = size / 2;
  const cy   = size / 2;
  const bx   = cx + bRadius * Math.cos(bAngle);
  const by   = cy + bRadius * Math.sin(bAngle);
  const br   = Math.max(4, wheelR * 0.065);

  const grad = wCtx.createRadialGradient(bx - br*0.3, by - br*0.3, 0, bx, by, br);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.4, '#c8c8c8');
  grad.addColorStop(1, '#555');
  wCtx.beginPath();
  wCtx.arc(bx, by, br, 0, Math.PI * 2);
  wCtx.fillStyle = grad;
  wCtx.fill();

  // Specular
  wCtx.beginPath();
  wCtx.arc(bx - br*0.28, by - br*0.3, br*0.22, 0, Math.PI * 2);
  wCtx.fillStyle = 'rgba(255,255,255,0.8)';
  wCtx.fill();
}

// ═══════════════════════════════════════════════════════
// SPIN ANIMATION
// ═══════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════
// SPIN ANIMATION — physics-based, no teleport
// ═══════════════════════════════════════════════════════

// wheelAngle is the current rotation of the wheel in radians
// slice = 2π/37, slot i is at angle: wheelAngle - π/2 + i*slice
// The indicator is at 12 o'clock (angle = -π/2 from center)
// Winning number = WHEEL_ORDER[slotAtIndicator]

function angleToSlot(angle) {
  const slice = (Math.PI * 2) / 37;
  // Normalize angle so indicator (top = -PI/2) maps to slot index
  let a = ((-angle - Math.PI / 2) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  const idx = Math.floor(a / slice) % 37;
  return RM.WHEEL_ORDER[idx];
}

function spinWheel(winNumber, onDone) {
  const slice = (Math.PI * 2) / 37;
  const winIdx = RM.WHEEL_ORDER.indexOf(winNumber);

  // Wheel rotates clockwise → totalAngle is negative
  const targetBase     = -(winIdx * slice + slice / 2) - Math.PI / 2;
  const extraTurns     = Math.PI * 2 * (5 + Math.floor(Math.random() * 4));
  const finalWheelAngle = targetBase - extraTurns;
  const totalAngle     = finalWheelAngle - wheelAngle; // negative (clockwise)
  const duration       = 5000 + Math.random() * 1000;
  const start          = performance.now();
  const startWheelAngle = wheelAngle;

  // Ball goes COUNTER to wheel (positive direction = counter-clockwise)
  const ballStartR    = wheelR * 0.93;
  const ballEndR      = wheelR * 0.68;
  const ballStartA    = Math.random() * Math.PI * 2;
  // Ball spins in OPPOSITE direction to wheel (totalAngle is negative, so ball is positive)
  const ballTurns     = Math.PI * 2 * (9 + Math.random() * 4); // positive = counter-clockwise
  const ballDuration  = duration * 0.78;

  // Track ball angle continuously — no snap at end
  let curBallA = ballStartA;
  let curBallR = ballStartR;

  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  function easeOutSine(t)  { return Math.sin(t * Math.PI / 2); }

  function frame(now) {
    const elapsed = now - start;
    const t       = Math.min(elapsed / duration, 1);
    const tBall   = Math.min(elapsed / ballDuration, 1);

    const tWheel  = easeOutCubic(t);
    const tBallE  = easeOutSine(tBall); // sine ease — smooth stop, no bounce

    const curWheelA = startWheelAngle + totalAngle * tWheel;
    curBallA  = ballStartA + ballTurns * tBallE;  // positive = counter-clockwise
    curBallR  = ballStartR - (ballStartR - ballEndR) * tBallE;

    drawWheel(curWheelA, null);
    drawBall(curBallA, curBallR);

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      wheelAngle = finalWheelAngle;
      // Draw final frame — ball stays exactly where it stopped, no snap
      drawWheel(finalWheelAngle, winNumber);
      drawBall(curBallA, curBallR); // same angle it was at, no teleport
      playWinSound();
      setTimeout(onDone, 700);
    }
  }

  requestAnimationFrame(frame);
}

// ═══════════════════════════════════════════════════════
// BET TABLE
// ═══════════════════════════════════════════════════════
function buildNumberGrid() {
  const grid = document.getElementById('number-grid');
  grid.innerHTML = '';
  // Row 3 (top): 3,6,9,...,36  Row 2: 2,5,8,...,35  Row 1: 1,4,7,...,34
  for (let row = 3; row >= 1; row--) {
    for (let col = 1; col <= 12; col++) {
      const num = (col - 1) * 3 + row;
      const cell = document.createElement('div');
      cell.className = `num-cell ${RM.isRed(num) ? 'red-num' : 'black-num'}`;
      cell.dataset.number = num;
      cell.textContent = num;
      cell.onclick = () => toggleStraight(num);
      grid.appendChild(cell);
    }
  }
}

function getActiveBetForType(type, key) {
  return bets.find(b => b.type === type && b.key === key);
}

function toggleStraight(num) {
  const key = `straight_${num}`;
  const existing = bets.find(b => b.key === key);
  if (existing) {
    existing.amount += chipValue;
  } else {
    bets.push({ type:'straight', numbers:[num], amount:chipValue, key, id:betIdCounter++ });
  }
  updateTableUI();
  updateBetsSummary();
}

function toggleDozen(d) {
  const key = `dozen_${d}`;
  const nums = Array.from({length:12}, (_,i) => (d-1)*12 + i + 1);
  const existing = bets.find(b => b.key === key);
  if (existing) existing.amount += chipValue;
  else bets.push({ type:'dozen', numbers:nums, amount:chipValue, key, id:betIdCounter++ });
  updateTableUI();
  updateBetsSummary();
}

function toggleColumn(c) {
  const key = `column_${c}`;
  const nums = [];
  for (let i = 0; i < 12; i++) nums.push(i * 3 + c);
  const existing = bets.find(b => b.key === key);
  if (existing) existing.amount += chipValue;
  else bets.push({ type:'column', numbers:nums, amount:chipValue, key, id:betIdCounter++ });
  updateTableUI();
  updateBetsSummary();
}

function toggleOutside(betType) {
  const key = `outside_${betType}`;
  let nums;
  switch(betType) {
    case 'red':   nums = [...RM.RED_NUMBERS]; break;
    case 'black': nums = Array.from({length:36},(_,i)=>i+1).filter(n=>!RM.isRed(n)); break;
    case 'even':  nums = Array.from({length:18},(_,i)=>(i+1)*2); break;
    case 'odd':   nums = Array.from({length:18},(_,i)=>i*2+1); break;
    case 'low':   nums = Array.from({length:18},(_,i)=>i+1); break;
    case 'high':  nums = Array.from({length:18},(_,i)=>i+19); break;
  }
  const existing = bets.find(b => b.key === key);
  if (existing) existing.amount += chipValue;
  else bets.push({ type:betType, numbers:nums, amount:chipValue, key, id:betIdCounter++ });
  updateTableUI();
  updateBetsSummary();
}

function updateTableUI() {
  // Clear all chips
  document.querySelectorAll('.chip-dot').forEach(d => d.remove());
  document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));

  bets.forEach(bet => {
    // Find cell
    let cell = null;
    if (bet.type === 'straight') {
      cell = document.querySelector(`[data-number="${bet.numbers[0]}"]`);
    } else if (bet.type === 'dozen') {
      const d = Math.ceil(bet.numbers[0] / 12);
      cell = document.querySelector(`[data-dozen="${d}"]`);
    } else if (bet.type === 'column') {
      const c = ((bet.numbers[0] - 1) % 3) + 1;
      cell = document.querySelector(`[data-col="${c}"]`);
    } else {
      cell = document.querySelector(`[data-bet="${bet.type}"]`);
    }
    if (cell) {
      cell.classList.add('selected');
      const dot = document.createElement('div');
      dot.className = 'chip-dot';
      dot.title = bet.amount + '$';
      // Show amount if > chipValue
      if (bet.amount > chipValue) {
        dot.style.width = '14px';
        dot.style.height = '14px';
        dot.style.fontSize = '7px';
        dot.style.color = '#000';
        dot.style.display = 'flex';
        dot.style.alignItems = 'center';
        dot.style.justifyContent = 'center';
        dot.textContent = bet.amount >= 100 ? Math.floor(bet.amount/100)+'C' : bet.amount;
      }
      cell.appendChild(dot);
    }
  });
}

function updateBetsSummary() {
  const total = bets.reduce((s, b) => s + b.amount, 0);
  const el = document.getElementById('bets-summary');
  if (total === 0) { el.textContent = ''; return; }
  el.innerHTML = `${bets.length} mise${bets.length>1?'s':''} — Total : <span>${total}$</span>`;
  document.getElementById('spin-btn').disabled = false;
}

function clearBets() {
  bets = [];
  updateTableUI();
  updateBetsSummary();
  document.getElementById('spin-btn').disabled = false;
  document.getElementById('win-message').textContent = 'Placez vos mises';
  document.getElementById('win-message').className = '';
  document.getElementById('last-net').textContent = '';
  document.getElementById('win-number-badge').classList.remove('visible');
}

function rebet() {
  if (!lastBets.length) return;
  bets = lastBets.map(b => ({...b, id: betIdCounter++}));
  updateTableUI();
  updateBetsSummary();
}

// ═══════════════════════════════════════════════════════
// SPIN LOGIC
// ═══════════════════════════════════════════════════════
function doSpin() {
  if (spinning) return;

  if (bets.length === 0) {
    const msg = document.getElementById('win-message');
    msg.textContent = '⚠️ Placez votre mise d\'abord';
    msg.className = 'lost';
    setTimeout(() => { msg.textContent = 'Placez vos mises'; msg.className = ''; }, 2500);
    return;
  }

  const total = bets.reduce((s,b) => s + b.amount, 0);
  if (total > balance) {
    document.getElementById('win-message').textContent = 'Solde insuffisant';
    return;
  }

  spinning = true;
  balance  = parseFloat((balance - total).toFixed(2));
  saveBalance();
  updateBalanceUI();
  lastBets = bets.map(b => ({...b}));

  document.getElementById('spin-btn').disabled = true;
  document.getElementById('win-message').textContent = 'Bonne chance...';
  document.getElementById('win-message').className = '';
  document.getElementById('last-net').textContent = '';
  document.getElementById('win-number-badge').classList.remove('visible');

  const winNumber = RM.spin();
  playSpinSound();

  spinWheel(winNumber, () => {
    // Evaluate
    const { totalNet, results } = RM.evaluateSpin(bets, winNumber);
    const net = parseFloat((totalNet - total).toFixed(2)); // net profit/loss

    balance = parseFloat((balance + totalNet).toFixed(2));
    saveBalance();
    updateBalanceUI();

    // Win number badge
    const info = RM.numberInfo(winNumber);
    const badge = document.getElementById('win-number-badge');
    badge.textContent = winNumber;
    badge.style.background = info.color === 'green' ? 'var(--green-lit)' : info.color === 'red' ? 'var(--red-lit)' : '#333';
    badge.style.color = '#fff';
    badge.classList.add('visible');

    // Highlight winning cells
    highlightWinning(winNumber);

    // Message
    const msgEl = document.getElementById('win-message');
    const netEl = document.getElementById('last-net');
    const anyWon = results.some(r => r.won);
    if (anyWon) {
      msgEl.textContent = `Numéro ${winNumber} — Gagné !`;
      msgEl.className = 'won';
      netEl.textContent = `+${(totalNet - total).toFixed(0)}$`;
      netEl.className = 'pos';
      showWinPopup(winNumber, totalNet, total);
    } else {
      msgEl.textContent = `Numéro ${winNumber} — Perdu`;
      msgEl.className = 'lost';
      netEl.textContent = `-${total.toFixed(0)}$`;
      netEl.className = 'neg';
    }

    spinning = false;
    document.getElementById('spin-btn').disabled = false;
    bets = [];
    updateTableUI();
    updateBetsSummary();
  });
}

function highlightWinning(num) {
  // Flash the winning number cell
  const cells = document.querySelectorAll(`[data-number="${num}"]`);
  cells.forEach(c => {
    c.classList.add('winning');
    setTimeout(() => c.classList.remove('winning'), 2400);
  });
}

function showWinPopup(winNumber, totalWin, betsTotal) {
  const existing = document.getElementById('win-popup');
  if (existing) existing.remove();

  const profit = totalWin - betsTotal;
  const info   = RM.numberInfo(winNumber);
  const bgColor = info.color === 'green' ? '#1a6b3a' : info.color === 'red' ? '#8b1a1a' : '#1a1a1a';
  const isJackpot = profit >= betsTotal * 10;
  const isBig     = profit >= betsTotal * 3;

  const popup = document.createElement('div');
  popup.id = 'win-popup';
  popup.style.cssText = `
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%) scale(0.7);
    opacity:0; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index:200; text-align:center; pointer-events:none;
    background:#0e0e0e; border:1px solid #333; border-radius:18px;
    padding:28px 40px; min-width:240px;
    box-shadow:0 0 50px rgba(255,255,255,0.06);
  `;

  popup.innerHTML = `
    <div style="font-size:0.55rem;letter-spacing:0.35em;color:#555;text-transform:uppercase;margin-bottom:10px;">
      ${isJackpot ? '🏆 JACKPOT' : isBig ? '✦ Gain' : '✦ Gagné'}
    </div>
    <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;">
      <div style="width:36px;height:36px;border-radius:50%;background:${bgColor};border:1px solid #555;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:0.8rem;font-weight:700;color:#fff;">${winNumber}</div>
    </div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:600;color:#fff;line-height:1;margin-bottom:6px;">+${profit.toFixed(0)}$</div>
    <div style="font-family:'Space Mono',monospace;font-size:0.65rem;color:#555;letter-spacing:0.1em;">Retour total : ${totalWin.toFixed(0)}$</div>
  `;

  document.body.appendChild(popup);
  requestAnimationFrame(() => {
    popup.style.opacity = '1';
    popup.style.transform = 'translate(-50%,-50%) scale(1)';
  });

  const delay = isJackpot ? 3500 : isBig ? 2800 : 2200;
  setTimeout(() => {
    popup.style.transition = 'opacity 0.4s, transform 0.4s';
    popup.style.opacity = '0';
    popup.style.transform = 'translate(-50%,-50%) scale(0.9)';
    setTimeout(() => popup.remove(), 450);
  }, delay);
}

// CHIP SELECTOR
// ═══════════════════════════════════════════════════════
function selectChip(val) {
  chipValue = val;
  document.querySelectorAll('.chip-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.value) === val);
  });
}

// ═══════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════
let audioCtx = null;
let musicPlaying = false;
let musicScheduler = null;
let musicNodes = [];

const NOTE = n => 440 * Math.pow(2, n / 12);

// Ambient suspended chords — same vibe as plinko
const chords = [
  [NOTE(-7), NOTE(-2), NOTE(2),  NOTE(5)],   // Dsus2
  [NOTE(-12),NOTE(-5), NOTE(-2), NOTE(3)],   // Asus4
  [NOTE(-14),NOTE(-7), NOTE(-2), NOTE(2)],   // Esus2
  [NOTE(-17),NOTE(-10),NOTE(-5), NOTE(0)],   // Bsus4
  [NOTE(-22),NOTE(-15),NOTE(-10),NOTE(-5)],  // Gsus2
  [NOTE(-7), NOTE(-2), NOTE(3),  NOTE(7)],   // Dsus4
];
const bass = [NOTE(-31),NOTE(-36),NOTE(-38),NOTE(-43),NOTE(-46),NOTE(-31)];
const CHORD_DUR = 3.2;

function getACtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function makePad(ctx, freq, t, dur, vol) {
  const osc = ctx.createOscillator(), gain = ctx.createGain(), filt = ctx.createBiquadFilter();
  osc.type = 'triangle'; osc.frequency.value = freq; osc.detune.value = (Math.random()-.5)*8;
  filt.type = 'lowpass'; filt.frequency.value = 750; filt.Q.value = 1.5;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.7);
  gain.gain.setValueAtTime(vol, t + dur - 0.8);
  gain.gain.linearRampToValueAtTime(0, t + dur + 0.5);
  osc.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
  osc.start(t); osc.stop(t + dur + 0.7);
  musicNodes.push(osc, gain, filt);
}

function makeBass(ctx, freq, t, dur) {
  const osc = ctx.createOscillator(), gain = ctx.createGain(), f = ctx.createBiquadFilter();
  osc.type = 'sine'; osc.frequency.value = freq;
  f.type = 'lowpass'; f.frequency.value = 280;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.1, t+0.05);
  gain.gain.setValueAtTime(0.1, t + dur*0.6);
  gain.gain.linearRampToValueAtTime(0, t + dur);
  osc.connect(f); f.connect(gain); gain.connect(ctx.destination);
  osc.start(t); osc.stop(t + dur + 0.1);
  musicNodes.push(osc, gain, f);
}

function makeHihat(ctx, t, vol) {
  const buf = ctx.createBuffer(1, ctx.sampleRate*0.05, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,3);
  const src = ctx.createBufferSource(), gain = ctx.createGain(), f = ctx.createBiquadFilter();
  src.buffer = buf; f.type='highpass'; f.frequency.value=7000; gain.gain.value=vol;
  src.connect(f); f.connect(gain); gain.connect(ctx.destination);
  src.start(t);
  musicNodes.push(src, gain, f);
}

function scheduleMusic() {
  if (!musicPlaying) return;
  const ctx = getACtx();
  const loopDur = chords.length * CHORD_DUR;
  const t = ctx.currentTime + 0.05;
  chords.forEach((chord, ci) => {
    const cs = t + ci * CHORD_DUR;
    chord.forEach(freq => makePad(ctx, freq, cs, CHORD_DUR + 0.8, 0.032));
    makeBass(ctx, bass[ci], cs, CHORD_DUR * 0.7);
    makeHihat(ctx, cs, 0.02);
    makeHihat(ctx, cs + CHORD_DUR*0.5, 0.012);
  });
  musicScheduler = setTimeout(scheduleMusic, (loopDur - 0.5) * 1000);
}

function startMusic() {
  if (musicPlaying || !soundEnabled) return;
  if (audioCtx) audioCtx.resume();
  musicPlaying = true;
  scheduleMusic();
}
function stopMusic() {
  musicPlaying = false;
  if (musicScheduler) { clearTimeout(musicScheduler); musicScheduler = null; }
  musicNodes = [];
  if (audioCtx) audioCtx.suspend();
}

function playSpinSound() {
  if (!soundEnabled) return;
  try {
    const ctx = getACtx();
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(200, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(80, ctx.currentTime + 3.5);
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.001, ctx.currentTime + 3.5);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 3.6);
  } catch(e) {}
}

function playWinSound() {
  if (!soundEnabled) return;
  try {
    const ctx = getACtx();
    [523, 659, 784].forEach((f, i) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'triangle'; osc.frequency.value = f;
      g.gain.setValueAtTime(0, ctx.currentTime + i*0.06);
      g.gain.linearRampToValueAtTime(0.1, ctx.currentTime + i*0.06 + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.06 + 0.5);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(ctx.currentTime + i*0.06);
      osc.stop(ctx.currentTime + i*0.06 + 0.6);
    });
  } catch(e) {}
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('snd-on').style.display  = soundEnabled ? 'block' : 'none';
  document.getElementById('snd-off').style.display = soundEnabled ? 'none'  : 'block';
  document.getElementById('sound-btn').style.opacity = soundEnabled ? '1' : '0.5';
  if (!soundEnabled) stopMusic(); else startMusic();
}

// INIT
// ═══════════════════════════════════════════════════════
document.addEventListener('click', () => { if (!musicPlaying) startMusic(); }, { once: true });
updateBalanceUI();
spinning = false;
